<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Black Hole — GH Games</title>
<style>
  html,body{margin:0;height:100%;background:#06040f;overflow:hidden;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
  canvas{display:block;touch-action:none;}
  .hud{position:fixed;top:12px;left:0;right:0;text-align:center;color:#bcaede;font-size:15px;pointer-events:none;text-shadow:0 1px 4px #000;}
  .back{position:fixed;top:12px;left:12px;color:#fff;text-decoration:none;background:rgba(255,255,255,.12);
        padding:8px 14px;border-radius:14px;font-weight:700;font-size:14px;backdrop-filter:blur(4px);}
</style>
</head>
<body>
<a class="back" href="index.html">← Back</a>
<div class="hud">Drag from anywhere and let go to fling a star ✨</div>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
}
window.addEventListener('resize', resize);
resize();

const G = 2600;        // gravity strength
const HOLE_R = 26;     // event horizon radius
const stars = [];      // {x,y,vx,vy,alive,trail:[],hue}
const particles = [];  // swallow flashes

// aim state
let aiming = false, ax = 0, ay = 0, sx = 0, sy = 0;

function addStar(x, y, vx, vy){
  stars.push({x, y, vx, vy, alive:true, trail:[], hue: 40 + Math.random()*40});
}

function pointer(e){
  const t = e.touches ? e.touches[0] : e;
  return {x: t.clientX, y: t.clientY};
}
function down(e){ e.preventDefault(); const p = pointer(e); aiming = true; sx = ax = p.x; sy = ay = p.y; }
function move(e){ if(!aiming) return; e.preventDefault(); const p = pointer(e); ax = p.x; ay = p.y; }
function up(e){
  if(!aiming) return; e.preventDefault();
  aiming = false;
  // velocity = release direction (slingshot)
  const vx = (sx - ax) * 2.2;
  const vy = (sy - ay) * 2.2;
  addStar(sx, sy, vx, vy);
}
canvas.addEventListener('mousedown', down);
canvas.addEventListener('mousemove', move);
window.addEventListener('mouseup', up);
canvas.addEventListener('touchstart', down, {passive:false});
canvas.addEventListener('touchmove', move, {passive:false});
canvas.addEventListener('touchend', up, {passive:false});

function swallow(x, y){
  for(let i=0;i<22;i++){
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*5;
    particles.push({x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, hue:50});
  }
}

let last = performance.now();
function loop(now){
  const dt = Math.min(0.033, (now - last)/1000); last = now;
  // background fade for trails
  ctx.fillStyle = 'rgba(6,4,15,0.28)';
  ctx.fillRect(0,0,W,H);

  // accretion glow
  const g = ctx.createRadialGradient(cx,cy,HOLE_R,cx,cy,HOLE_R*6);
  g.addColorStop(0,'rgba(120,80,255,0.35)');
  g.addColorStop(1,'rgba(120,80,255,0)');
  ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx,cy,HOLE_R*6,0,7); ctx.fill();

  // the hole
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(cx,cy,HOLE_R,0,7); ctx.fill();
  ctx.strokeStyle = 'rgba(70,230,255,0.5)'; ctx.lineWidth=2; ctx.stroke();

  // update stars
  for(const st of stars){
    if(!st.alive) continue;
    const dx = cx - st.x, dy = cy - st.y;
    const d2 = dx*dx + dy*dy;
    const d = Math.sqrt(d2) || 1;
    const a = G / Math.max(d2, 400);
    st.vx += (dx/d) * a * dt * 60;
    st.vy += (dy/d) * a * dt * 60;
    st.x += st.vx * dt;
    st.y += st.vy * dt;
    st.trail.push({x:st.x, y:st.y});
    if(st.trail.length > 18) st.trail.shift();
    if(d < HOLE_R + 4){ st.alive = false; swallow(st.x, st.y); }
  }
  // draw stars + trails
  for(const st of stars){
    if(!st.alive) continue;
    for(let i=0;i<st.trail.length;i++){
      const p = st.trail[i], al = i/st.trail.length;
      ctx.fillStyle = `hsla(${st.hue},100%,70%,${al*0.5})`;
      ctx.beginPath(); ctx.arc(p.x,p.y, 2+al*2, 0,7); ctx.fill();
    }
    ctx.fillStyle = `hsl(${st.hue},100%,75%)`;
    ctx.shadowColor = `hsl(${st.hue},100%,70%)`; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(st.x, st.y, 6, 0,7); ctx.fill();
    ctx.shadowBlur = 0;
  }
  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p = particles[i];
    p.x+=p.vx; p.y+=p.vy; p.life-=dt*1.8;
    if(p.life<=0){ particles.splice(i,1); continue; }
    ctx.fillStyle = `hsla(${p.hue},100%,70%,${p.life})`;
    ctx.beginPath(); ctx.arc(p.x,p.y,3*p.life,0,7); ctx.fill();
  }
  // aim line
  if(aiming){
    ctx.strokeStyle = 'rgba(255,210,74,0.8)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(ax,ay); ctx.stroke();
    ctx.fillStyle='rgba(255,210,74,0.9)'; ctx.beginPath(); ctx.arc(sx,sy,7,0,7); ctx.fill();
  }
  // tidy dead stars occasionally
  if(stars.length > 60){ for(let i=stars.length-1;i>=0;i--){ if(!stars[i].alive){ stars.splice(i,1);} } }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
