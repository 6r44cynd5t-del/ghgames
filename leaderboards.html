<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboards — GH Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --space-deep:#0b0720;--space-mid:#1a0f3d;--space-glow:#2d1a66;
    --star-gold:#ffd24a;--energy-cyan:#46e6ff;--coral:#ff6b81;--text:#f3eeff;--text-soft:#bcaede;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Nunito',system-ui,sans-serif;color:var(--text);min-height:100vh;
    background:
      radial-gradient(circle at 20% 15%, rgba(70,230,255,.12), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(255,107,129,.12), transparent 45%),
      linear-gradient(160deg, var(--space-deep), var(--space-mid) 60%, var(--space-glow));
    padding:28px 18px 64px;-webkit-tap-highlight-color:transparent;
  }
  .wrap{max-width:1140px;margin:0 auto}
  .back{color:var(--text-soft);text-decoration:none;font-weight:700;font-size:.9rem}
  header{text-align:center;margin:14px 0 24px}
  h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:clamp(34px,7vw,56px);
     background:linear-gradient(90deg,var(--star-gold),var(--energy-cyan),var(--coral));
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .tag{color:var(--text-soft);font-weight:700;margin-top:6px}
  .boards{display:grid;gap:18px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));align-items:start;margin-top:18px}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← arcade</a>
  <header>
    <h1>🏆 Leaderboards</h1>
    <div class="tag">Set your nickname once, then climb the boards in every game.</div>
  </header>

  <div id="nick"></div>

  <div class="boards">
    <div id="lb-frenzy"></div>
    <div id="lb-obby"></div>
    <div id="lb-log"></div>
  </div>
</div>

<script src="leaderboard.js"></script>
<script>
  if (window.Leaderboard) {
    Leaderboard.mountNick('nick');
    Leaderboard.mount({ el:'lb-frenzy', game:'click-frenzy', dir:'desc', unit:'clicks', showNick:false, title:'Click Frenzy' });
    Leaderboard.mount({ el:'lb-obby',   game:'obby',         dir:'asc',  unit:'sec',    showNick:false, title:'Mega Obby — fastest time' });
    Leaderboard.mount({ el:'lb-log',    game:'log-clicker',  dir:'desc', unit:'wood',   showNick:false, title:'Log Clicker — all-time wood' });
  }
</script>
</body>
</html>
